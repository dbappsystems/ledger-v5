<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us — Load Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#0A1628;--navy2:#0f2238;--navy3:#16304d;--amber:#ffb300;--white:#f5f7fa;--grey:#8aa0b8;--border:#1e3a5c;--green:#43a047;--red:#e53935;--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--navy);color:var(--white);font-family:var(--font-body);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:32px 20px 80px}
  .brand{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
  .brand .logo{font-family:var(--font-head);font-weight:900;font-size:24px;color:var(--amber)}
  .brand .v{font-family:var(--font-head);font-weight:700;font-size:11px;color:var(--grey)}
  h1{font-family:var(--font-head);font-weight:900;font-size:30px;letter-spacing:0.02em;margin:18px 0 4px}
  .sub{color:var(--grey);font-size:15px;margin-bottom:28px}
  label{display:block;font-family:var(--font-head);font-weight:700;font-size:12px;letter-spacing:0.06em;color:var(--grey);margin:16px 0 6px}
  input,textarea{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--white);border-radius:8px;padding:12px 14px;font-size:16px;font-family:var(--font-body);outline:none}
  input:focus,textarea:focus{border-color:var(--amber)}
  textarea{min-height:120px;resize:vertical}
  button{width:100%;margin-top:22px;padding:15px 0;border:none;border-radius:10px;background:var(--amber);color:var(--navy);font-family:var(--font-head);font-weight:900;font-size:16px;letter-spacing:0.04em;cursor:pointer}
  button:disabled{background:#555;color:#aaa;cursor:default}
  .msg{margin-top:18px;padding:14px 16px;border-radius:8px;font-family:var(--font-head);font-weight:700;font-size:14px;text-align:center;display:none}
  .msg.ok{display:block;background:#143d1c;color:#79e08b;border:1px solid var(--green)}
  .msg.err{display:block;background:#3a1010;color:#ff9b9b;border:1px solid var(--red)}
  footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--border);color:var(--grey);font-size:12px}
  footer a{color:var(--grey)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="logo">loadledgers</span><span class="v">v5</span></div>
  <h1>Customer Inquiry Form</h1>
  <div class="sub">Questions about the platform, the terms, account setup, or a data request? Send a message and we'll respond.</div>

  <div id="form">
    <label for="name">Name</label>
    <input type="text" id="name" autocomplete="name" />

    <label for="company">Company</label>
    <input type="text" id="company" autocomplete="organization" />

    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="email" inputmode="email" />

    <label for="message">Message</label>
    <textarea id="message" placeholder="How can we help?"></textarea>

    <button id="send" onclick="submitForm()">SEND MESSAGE</button>
    <div id="result" class="msg"></div>
  </div>

  <footer>
    dbappsystems.com &nbsp;·&nbsp; <a href="/terms">Terms of Service</a> &nbsp;·&nbsp; <a href="/privacy">Privacy Policy</a> &nbsp;·&nbsp; <a href="/dpa">Data Processing Agreement</a><br/>© 2026 dbappsystems.com. All rights reserved.
  </footer>
</div>

<script>
  var API_BASE = 'https://ledger-v5.d49rwgmpj9.workers.dev';
  function show(kind, text){
    var el = document.getElementById('result');
    el.className = 'msg ' + kind;
    el.textContent = text;
  }
  async function submitForm(){
    var name = document.getElementById('name').value.trim();
    var company = document.getElementById('company').value.trim();
    var email = document.getElementById('email').value.trim();
    var message = document.getElementById('message').value.trim();
    if(!name || !email || !message){ show('err','Please fill in your name, email, and message.'); return; }
    var btn = document.getElementById('send');
    btn.disabled = true; btn.textContent = 'SENDING...';
    try{
      var res = await fetch(API_BASE + '/api/contact', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:name, company:company, email:email, message:message })
      });
      if(res.ok){
        document.getElementById('name').value='';
        document.getElementById('company').value='';
        document.getElementById('email').value='';
        document.getElementById('message').value='';
        show('ok','Thanks \u2014 your message has been sent. We\u2019ll be in touch.');
      } else {
        show('err','Something went wrong sending your message. Please try again.');
      }
    } catch(e){
      show('err','Could not reach the server. Please check your connection and try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'SEND MESSAGE';
    }
  }
</script>
</body>
</html>
