    <!-- PDF.js — only needed when scanning a PDF rate con/receipt. Loaded
         defensively: if the CDN is slow or blocked on cellular, image scans
         must still work (they never touch PDF.js). The worker config is set
         once the library is ready, and a load failure is logged, not fatal. -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <script>
      // Configure the PDF.js worker as soon as the library is present. This runs
      // both on immediate availability and after the async script finishes.
      window.__configurePdfJs = function () {
        if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
          return true;
        }
        return false;
      };
    </script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"
      crossorigin="anonymous"
      onload="window.__configurePdfJs && window.__configurePdfJs();"
      onerror="console.error('PDF.js failed to load from CDN — PDF scans unavailable, image scans still work.');"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
